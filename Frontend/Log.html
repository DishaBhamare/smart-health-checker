<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Smart Health Checker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="log.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 py-3 d-flex justify-content-between">
  <span class="navbar-brand">Smart Health Checker</span>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="Log.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>

<!-- LOGIN -->
<div class="login-container">

  <div class="card login-card shadow">

    <h3 class="text-center mb-1">Welcome Back</h3>
    <p class="text-center text-muted mb-4">Login to continue</p>

    <!-- ✅ FIXED FORM -->
    <form id="loginForm" autocomplete="off">

      <div class="mb-3">
        <label>Email</label>
        <input 
          type="email" 
          id="email" 
          class="form-control"
          autocomplete="off"
          required>
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-control"
          autocomplete="new-password"
          required>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        Login
      </button>

      <p class="text-center mt-3">
        Don't have account?
        <a href="register.html">Register</a>
      </p>

    </form>

    <div id="message" class="mt-3 text-center"></div>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <p class="mb-1">Smart Health Checker © 2026</p>
  <small>AI Powered Symptom Analysis Tool</small>
</footer>

<script src="log.js"></script>

</body>
</html>

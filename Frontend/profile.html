<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="profile.css">


</head>
<body>

  <nav class="navbar navbar-dark px-4 shadow">

  <span class="navbar-brand">Smart Health Checker</span>

  <div class="nav-links">

    <a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>

    <a href="checkSymp.html" class="btn btn-outline-light me-2">Check Symptoms</a>

    <a href="profile.html" class="btn btn-outline-light me-2">Profile</a>

    <a href="index.html" class="btn btn-outline-light me-2">Home</a>

    <button class="btn btn-danger" onclick="logout()">Logout</button>

  </div>

</nav>

<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- LEFT SIDE -->
    <div class="col-md-4 col-lg-3 sidebar d-flex justify-content-center align-items-center p-4">

      <div class="card profile-card shadow text-center p-4 w-100">

        <img id="profile-pic"
             src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
             class="profile-img mb-3 mx-auto d-block"
             >

        <h4 id="name">Username</h4>
        <p id="email" class="text-muted">user@email.com</p>

        <input type="file" id="picInput" accept="image/*" class="form-control my-3">

        <button onclick="logout()" class="btn btn-danger w-100">
          Logout
        </button>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-8 col-lg-9 p-4">

      <!-- STATS -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="card stat-card total-card p-3 text-center">
            <h6>Total Checks</h6>
            <h2 id="totalChecks">0</h2>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card stat-card high-card p-3 text-center">
            <h6>High Risk Cases</h6>
            <h2 id="highRiskCount">0</h2>
          </div>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="card history-card shadow p-4">
        <h4 class="mb-3">Diagnosis History</h4>

        <div id="historyList" style="max-height: 420px; overflow-y: auto;">
          <p class="text-muted">Loading history...</p>
        </div>

      </div>

    </div>

  </div>
</div>

<footer class="footer text-center">
  <p class="mb-1">Smart Health Checker © 2026</p>
  <small>AI Powered Symptom Analysis Tool</small>
</footer>

<script src="profile.js"></script>
</body>
</html>
